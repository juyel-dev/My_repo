name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android native project
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: '1'

      - name: Patch gradle.properties for Node path
        run: |
          echo "" >> android/gradle.properties
          echo "NODE_BINARY=$(which node)" >> android/gradle.properties
          echo "hermesEnabled=true" >> android/gradle.properties
          echo "org.gradle.configureondemand=false" >> android/gradle.properties
          echo "org.gradle.configuration-cache=false" >> android/gradle.properties

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --no-configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.warning.mode=none

      - name: Find and rename APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          VERSION=$(node -p "require('./package.json').version")
          NAME="NeuralKey-v${VERSION}-build${{ github.run_number }}.apk"
          cp "$APK" "$NAME"
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.name }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NeuralKey v1.0.${{ github.run_number }}
          body: |
            ## NeuralKey APK — Build ${{ github.run_number }}

            Built from commit `${{ github.sha }}`

            ### What is new
            - Working Copy and Retry buttons in chat
            - Test Endpoint for API provider validation
            - Agent filter chips and search bar
            - Centralized constants architecture
            - Debounced state persistence
            - Smart QueryClient retry logic

            ### How to install
            1. Download the APK file below
            2. On Android go to Settings and enable Install from Unknown Sources
            3. Tap the downloaded APK to install
          files: ${{ steps.apk.outputs.name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
